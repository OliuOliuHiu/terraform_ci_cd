---
# tasks file for roles/cadvisor
- name: Pull cAdvisor image
  ansible.builtin.command: docker pull "{{ cadvisor_image }}"
  register: cadvisor_image_pull
  changed_when: "'Downloaded newer image' in cadvisor_image_pull.stdout or 'Pull complete' in cadvisor_image_pull.stdout"

- name: Remove old cAdvisor container
  ansible.builtin.command: docker rm -f "{{ cadvisor_container_name }}"
  register: cadvisor_container_remove
  failed_when: false
  changed_when: cadvisor_container_remove.rc == 0

# cAdvisor cần đọc dữ liệu container/cgroup của host -> mount rootfs, docker socket,
# sysfs... và cần --privileged + --device /dev/kmsg trên Ubuntu để thu đủ metrics.
- name: Run cAdvisor container
  ansible.builtin.command:
    argv:
      - docker
      - run
      - -d
      - --name
      - "{{ cadvisor_container_name }}"
      - --restart
      - unless-stopped
      - --privileged
      - --device
      - /dev/kmsg
      - -p
      - "{{ cadvisor_port }}:8080"
      - -v
      - "/:/rootfs:ro"
      - -v
      - "/var/run:/var/run:ro"
      - -v
      - "/sys:/sys:ro"
      - -v
      - "/var/lib/docker/:/var/lib/docker:ro"
      - -v
      - "/dev/disk/:/dev/disk:ro"
      - "{{ cadvisor_image }}"
