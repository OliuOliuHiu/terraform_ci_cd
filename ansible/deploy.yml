---
# Deploy NestJS app: pull image từ registry tự-host, chạy container app.
# KHÔNG dựng nginx ở đây — deploy nằm private subnet, không nhận traffic từ
# internet. nginx trên 'web' terminate TLS rồi proxy /app -> deploy:3000.
#
# Biến môi trường (Jenkinsfile export trước khi gọi playbook này):
#   REGISTRY_HOST / REGISTRY_USERNAME / REGISTRY_TOKEN  -> pull image
#   APP_IMAGE                                           -> image theo commit SHA
- name: Deploy NestJS application (app container)
  hosts: app
  become: true
  roles:
    - run
