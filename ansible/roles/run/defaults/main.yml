---
# defaults file for roles/run
# Registry tự-host (Phương án 3). Deploy server pull image TRỰC TIẾP từ đây qua TLS.
# Host này phải đã được registry_client role chuẩn bị (/etc/hosts + CA trust).
registry_host: "{{ lookup('env', 'REGISTRY_HOST') | default('registry.internal:5000', true) }}"
registry_username: "{{ lookup('env', 'REGISTRY_USERNAME') | default('', true) }}"
registry_token: "{{ lookup('env', 'REGISTRY_TOKEN') | default('', true) }}"

app_image_name: "{{ registry_host }}/nestjs-dev"
app_image_tag: latest
app_image: "{{ lookup('env', 'APP_IMAGE') | default(app_image_name ~ ':' ~ app_image_tag, true) }}"

app_container_name: nestjs-app

# App publish thẳng ra port này trên deploy server — KHÔNG có nginx/TLS ở đây.
# Deploy nằm private subnet: deploy_sg chỉ mở 3000 cho web_server_sg (xem
# deploy_ingress_ports trong infra/terraform/locals.tf), không có đường từ
# internet vào. nginx trên 'web' mới là chỗ terminate TLS rồi proxy
# /app -> deploy:3000 (infra/ansible/roles/nginx/templates/default.conf.j2).
#
# Đổi giá trị này thì phải đổi đồng bộ 2 chỗ:
#   - deploy_ingress_ports  (infra/terraform/locals.tf)
#   - deploy_upstream_port  (infra/ansible/roles/nginx/defaults/main.yml)
app_port: 3000
