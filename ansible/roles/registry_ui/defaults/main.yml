---
# defaults file for registry_ui
registry_ui_version: "2.5.7"
registry_ui_image: "joxit/docker-registry-ui:{{ registry_ui_version }}"
registry_ui_container_name: registry-ui

# UI lắng nghe cổng 80 trong container; publish ra 8082 trên app_runtime.
# nginx (web) proxy "/" (gốc) sang đây.
registry_ui_http_port: 8082

# URL CÔNG KHAI của registry — browser (trang UI) gọi API /v2/ qua URL này.
# UI phục vụ CÙNG domain/IP với registry nên đây chính là địa chỉ web (EIP) + https
# => browser gọi /v2/ cùng origin, KHÔNG dính CORS.
# ĐỔI cho khớp EIP/domain hiện tại của em.
registry_ui_public_host: "32.236.251.169"
registry_ui_registry_url: "https://{{ registry_ui_public_host }}"

registry_ui_title: "self-hosted Registry"
