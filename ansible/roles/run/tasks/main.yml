---
# tasks file for roles/run
# Chỉ chạy container app và publish ra {{ app_port }}. Không có nginx/TLS ở đây:
# deploy nằm private subnet, TLS + reverse proxy do nginx trên 'web' lo.

- name: Login to self-hosted registry
  ansible.builtin.command: docker login "{{ registry_host }}" --username "{{ registry_username }}" --password-stdin
  args:
    stdin: "{{ registry_token }}"
  register: registry_login
  changed_when: "'Login Succeeded' in registry_login.stdout"
  no_log: true
  when:
    - registry_username | length > 0
    - registry_token | length > 0

- name: Pull application image
  ansible.builtin.command: docker pull "{{ app_image }}"
  register: app_image_pull
  changed_when: "'Downloaded newer image' in app_image_pull.stdout or 'Pull complete' in app_image_pull.stdout"

- name: Remove old application container
  ansible.builtin.command: docker rm -f "{{ app_container_name }}"
  register: app_container_remove
  failed_when: false
  changed_when: app_container_remove.rc == 0

# -p {{ app_port }}:3000 -> nginx trên 'web' proxy /app tới đây được.
# Thiếu -p là app chỉ sống trong docker network, web nginx nhận 502.
- name: Create application container
  ansible.builtin.command:
    argv:
      - docker
      - run
      - -d
      - --name
      - "{{ app_container_name }}"
      - --restart
      - unless-stopped
      - -p
      - "{{ app_port }}:3000"
      - -e
      - "NODE_ENV=production"
      - "{{ app_image }}"
