---
# defaults file for roles/cadvisor
# Pin version cụ thể — không dùng ':latest' trôi nổi.
cadvisor_version: "v0.54.1"
cadvisor_image: "gcr.io/cadvisor/cadvisor:{{ cadvisor_version }}"
cadvisor_container_name: cadvisor

# cAdvisor nghe 8080 TRONG container. Publish ra host 8081 vì host 8080 đã bị
# Jenkins chiếm trên con app. Dùng 8081 đồng bộ cả web lẫn app.
cadvisor_port: 8081
