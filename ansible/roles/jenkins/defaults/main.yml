---
# defaults file for roles/jenkins
# Pin version CỤ THỂ - không dùng tag ':lts' trôi nổi.
# Xác nhận tag đang có trên Docker Hub trước khi chạy (xem hướng dẫn),
# hoặc pin theo digest (jenkins_image: jenkins/jenkins@sha256:...) để bất biến tuyệt đối.
jenkins_version: "2.516.3-lts-jdk21"
jenkins_image: "jenkins/jenkins:{{ jenkins_version }}"
jenkins_container_name: jenkins

# port publish trên app_runtime (web nginx proxy /jenkins/ sang đây)
jenkins_http_port: 8080
# Không cần port 50000 (JNLP inbound): agent dùng WebSocket, chui qua cổng HTTP
# 8080 theo path /jenkins/ -> hợp với app private subnet (không mở port riêng).

# Jenkins phục vụ dưới sub-path này để nginx route theo /jenkins
jenkins_prefix: /jenkins

# volume lưu JENKINS_HOME (persistent qua các lần deploy)
jenkins_home_volume: jenkins_home
