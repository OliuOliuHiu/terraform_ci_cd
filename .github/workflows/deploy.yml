name: CI/CD Deploy to EC2

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: "deploy"
        type: choice
        options:
          - deploy
          - start
          - stop
          - destroy

env:
  AWS_REGION: ap-southeast-2
  TF_WORKING_DIR: terraform
  IMAGE_NAME: lab-02-tera
  ENVIRONMENT: dev

jobs:
  deploy:
    if: github.event_name == 'push' || inputs.action == 'deploy'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Docker image name
        id: image
        run: echo "name=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:latest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # - name: Get Github runner public IP
      #   id: runner-ip
      #   run: echo "cidr=$(curl -fsSL https://checkip.amazonaws.com | tr -d '\n')/32" >> "$GITHUB_OUTPUT"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_ec2_public_key: ${{ secrets.EC2_SSH_PUBLIC_KEY }}
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_environment: ${{ env.ENVIRONMENT }}
          TF_VAR_ssh_allowed_cidrs: '["${{ secrets.MY_IP }}/32"]'
          TF_VAR_project_name: ${{ env.IMAGE_NAME }}
        run: terraform apply -auto-approve -input=false

      - name: Terraform output
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform output

      - name: Read EC2 public IP
        id: tf-output
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: echo "public_ip=$(terraform output -raw ec2_instance_public_ip)" >> "$GITHUB_OUTPUT"

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Prepare SSH key files
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key

      - name: Create Ansible inventory file
        run: |
            cat > ansible/inventory.ci.ini <<EOF
            [webservers]
            target1 ansible_host=${{ steps.tf-output.outputs.public_ip }} ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/ec2_key ansible_python_interpreter=/usr/bin/python3
            EOF

      - name: Run Ansible playbook
        env:
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          ansible-playbook -i ansible/inventory.ci.ini ansible/deploy.yml

      # - name: Upload deployment files to EC2
      #   uses: appleboy/scp-action@v0.1.7
      #   with:
      #     host: ${{ steps.tf-output.outputs.public_ip }}
      #     username: ubuntu
      #     key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
      #     source: "deploy/deploy.sh,deploy/nginx/default.conf"
      #     target: "/home/ubuntu/lab-02-tera"

      # - name: Deploy containers to EC2
      #   uses: appleboy/ssh-action@v1.2.0
      #   with:
      #     host: ${{ steps.tf-output.outputs.public_ip }}
      #     username: ubuntu
      #     key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
      #     script: |
      #       set -eux
      #       sudo sh /home/ubuntu/lab-02-tera/deploy/deploy.sh \
      #         "${{ steps.image.outputs.name }}:${{ github.sha }}" \
      #         "/home/ubuntu/lab-02-tera/deploy/nginx/default.conf"

  destroy:
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform destroy
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_ec2_public_key: ${{ secrets.EC2_SSH_PUBLIC_KEY }}
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_environment: ${{ env.ENVIRONMENT }}
          TF_VAR_ssh_allowed_cidrs: '["0.0.0.0/0"]'
          TF_VAR_project_name: ${{ env.IMAGE_NAME }}
        run: terraform destroy -auto-approve -input=false

  start:
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'start'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Read EC2 instance ID
        id: tf-output
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: echo "instance_id=$(terraform output -raw ec2_instance_id)" >> "$GITHUB_OUTPUT"

      - name: Start EC2 instance
        run: aws ec2 start-instances --instance-ids "${{ steps.tf-output.outputs.instance_id }}"

      - name: Wait until EC2 is running
        run: aws ec2 wait instance-running --instance-ids "${{ steps.tf-output.outputs.instance_id }}"


  stop:
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'stop'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Read EC2 instance ID
        id: tf-output
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: echo "instance_id=$(terraform output -raw ec2_instance_id)" >> "$GITHUB_OUTPUT"

      - name: Stop EC2 instance
        run: aws ec2 stop-instances --instance-ids "${{ steps.tf-output.outputs.instance_id }}"

      - name: Wait until EC2 is stopped
        run: aws ec2 wait instance-stopped --instance-ids "${{ steps.tf-output.outputs.instance_id }}"
