---
- name: Install Docker on all servers
  hosts: all
  become: true
  tags: docker
  roles:
    - docker

- name: Install exporters on monitored servers (web + app + repo_server)
  hosts: web:app:repo_server
  become: true
  roles:
    - role: node_exporter
      tags: node_exporter
    - role: cadvisor
      tags: cadvisor

- name: Configure nginx reverse proxy
  hosts: web
  become: true
  tags: nginx
  roles:
    - nginx

- name: Configure app services (Jenkins + Registry + Registry UI)
  hosts: app
  become: true
  roles:
    - role: jenkins
      tags: jenkins
    - role: registry
      tags: registry
    - role: registry_ui
      tags: registry_ui

- name: Configure repo server (GitLab)
  hosts: repo_server
  become: true
  roles:
    - role: gitlab
      tags: gitlab

- name: Configure monitoring stack (Prometheus + Grafana)
  hosts: monitoring
  become: true
  tags: monitoring
  roles:
    - prometheus
    - grafana
