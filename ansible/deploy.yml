---
- name: Install Docker on all servers
  hosts: all
  become: true
  tags: docker
  roles:
    - docker

- name: Install node_exporter on monitored servers (web + app)
  hosts: web:app
  become: true
  tags: node_exporter
  roles:
    - node_exporter

- name: Configure nginx reverse proxy
  hosts: web
  become: true
  tags: nginx
  roles:
    - nginx

- name: Configure app services (Jenkins + GitLab)
  hosts: app
  become: true
  tags: jenkins
  roles:
    - jenkins
    # - gitlab

- name: Configure monitoring stack (Prometheus + Grafana)
  hosts: monitoring
  become: true
  tags: monitoring
  roles:
    - prometheus
    - grafana
