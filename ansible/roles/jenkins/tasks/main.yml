---
# tasks file for roles/jenkins
- name: Pull Jenkins image
  ansible.builtin.command: docker pull "{{ jenkins_image }}"
  register: jenkins_image_pull
  changed_when: "'Downloaded newer image' in jenkins_image_pull.stdout or 'Pull complete' in jenkins_image_pull.stdout"

- name: Ensure Jenkins home volume exists
  ansible.builtin.command: docker volume create "{{ jenkins_home_volume }}"
  register: jenkins_volume
  changed_when: "jenkins_home_volume in jenkins_volume.stdout"

- name: Remove old Jenkins container
  ansible.builtin.command: docker rm -f "{{ jenkins_container_name }}"
  register: jenkins_container_remove
  failed_when: false
  changed_when: jenkins_container_remove.rc == 0

- name: Run Jenkins container
  ansible.builtin.command:
    argv:
      - docker
      - run
      - -d
      - --name
      - "{{ jenkins_container_name }}"
      - --restart
      - unless-stopped
      - -p
      - "{{ jenkins_http_port }}:8080"
      - -e
      - "JENKINS_OPTS=--prefix={{ jenkins_prefix }}"
      - -v
      - "{{ jenkins_home_volume }}:/var/jenkins_home"
      - "{{ jenkins_image }}"
